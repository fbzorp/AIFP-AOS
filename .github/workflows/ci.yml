name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Added for manual trigger

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aifp
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: aifp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run linting
      run: |
        ruff check apps/
        mypy apps/
    
    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://aifp:testpassword@localhost:5432/aifp_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        pytest tests/ -v --cov=apps --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: apps/dashboard/package-lock.json
    
    - name: Install dependencies
      working-directory: ./apps/dashboard
      run: npm ci
    
    - name: Run linter
      working-directory: ./apps/dashboard
      run: npm run lint
    
    - name: Build frontend
      working-directory: ./apps/dashboard
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build API image
      run: |
        docker build -f Dockerfile.dev -t aifp-aos-api:test .
    
    - name: Build Frontend image
      run: |
        docker build -f apps/dashboard/Dockerfile.dev -t aifp-aos-frontend:test apps/dashboard
